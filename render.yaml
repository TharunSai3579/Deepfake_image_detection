services:
  - type: web
    name: deepfake-app
    env: python
    plan: standard
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 180
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
